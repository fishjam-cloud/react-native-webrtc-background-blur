plugins {
    id 'com.android.library'
    id 'com.facebook.react'
}

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
    namespace "com.fishjam.blur"
    compileSdk safeExtGet('compileSdkVersion', 34)

    defaultConfig {
        minSdk 24
        targetSdk safeExtGet('targetSdkVersion', 34)
        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", (rootProject.hasProperty("newArchEnabled") && rootProject.newArchEnabled == "true").toString()
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main {
            if (rootProject.hasProperty("newArchEnabled") && rootProject.newArchEnabled == "true") {
                java.srcDirs += 'src/newarch'
            } else {
                java.srcDirs += 'src/oldarch'
            }
        }
    }
}

dependencies {
    implementation "com.facebook.react:react-android"
    compileOnly project(':fishjam-cloud_react-native-webrtc')
    implementation 'com.google.mlkit:segmentation-selfie:16.0.0-beta6'
}
